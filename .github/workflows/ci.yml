name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: black --check .
      - run: mypy src backend || true   # relaxed in Wave 0; strict in Wave 4
      - run: PYTHONPATH=. pytest -m unit -q
