stages:
  ingest:
    cmd: python -m src.data.ingest
    outs:
      - data/raw/external
  synth_pa:
    cmd: python -m src.data.synthesize --out data/raw/synthetic_v1 --programmatic
    deps:
      - src/data/synthesize.py
      - prompts/synthesize
    outs:
      - data/raw/synthetic_v1
  clean:
    cmd: python -m src.data.clean
    deps:
      - data/raw/external
      - data/raw/synthetic_v1
      - src/data/clean.py
    outs:
      - data/interim
  label_map:
    cmd: python -m src.data.label_map
    deps:
      - data/interim
      - src/data/label_map.py
    outs:
      - data/processed
  drift_baseline:
    cmd: python -m src.data.drift_baseline
    deps:
      - data/processed
      - src/data/drift_baseline.py
    outs:
      - data/reference
  train:
    cmd: mlflow run . -e train --env-manager=local
    deps:
      - data/processed
      - src/train.py
      - src/models
    outs:
      - models/
  evaluate:
    cmd: python -m src.evaluate
    deps:
      - models/
      - data/processed
    metrics:
      - eval.json:
          cache: false
